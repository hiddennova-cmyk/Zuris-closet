<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zuri's Closet</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500&family=Libre+Baskerville:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --rose:#9B3060;
  --blush:#F9E8EC;
  --champagne:#EDD5C8;
  --gold:#C9A0A8;
  --gold-lt:#E8C8D0;
  --ink:#5A2038;
  --panel-dark:#3A1028;
  --panel-light:#FFF8F5;
  --panel-border:rgba(200,160,170,0.2);
  --panel-title:#E8C8D0;
  --panel-text:rgba(240,220,228,0.65);
  --panel-text-on:#E8C8D0;
  --panel-item-bg:rgba(240,220,228,0.05);
  --panel-item-on:rgba(200,140,160,0.12);
  --panel-item-border:rgba(200,160,170,0.18);
  --panel-item-border-on:#C9A0A8;
  --right-border:#EED8E0;
  --right-title:#5A2038;
  --right-tab-off:#B09098;
  --right-tab-on:#5A2038;
  --right-item:#FFF8F5;
  --right-item-on:#FFF0F5;
  --right-item-border:#EED8E0;
  --right-item-border-on:#C9559A;
  --right-thumb:#EED8E0;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100vh;overflow:hidden;background:var(--panel-dark);font-family:'DM Sans',sans-serif;}

/* LANDING */
#landing{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  background:radial-gradient(ellipse at center,#6A2040 0%,#3D1020 50%,#1A0810 100%);
  transition:opacity 0.8s ease 1.4s;
}
#landing.gone{opacity:0;pointer-events:none;}
.landing-eyebrow{
  font-family:'DM Sans',sans-serif;font-size:0.58rem;letter-spacing:0.35em;
  text-transform:uppercase;color:rgba(232,200,210,0.4);margin-bottom:20px;
}
.armoire-wrap{
  position:relative;width:min(320px,85vw);cursor:pointer;
  filter:drop-shadow(0 40px 80px rgba(0,0,0,0.7));
}
.cornice{
  width:106%;margin-left:-3%;height:18px;
  background:var(--panel-dark);border:1.5px solid var(--gold-lt);
  border-radius:2px 2px 0 0;
  display:flex;align-items:center;justify-content:center;
}
.cornice-text{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:0.65rem;letter-spacing:0.25em;color:var(--gold-lt);opacity:0.8;
}
.armoire-body{
  position:relative;background:var(--panel-dark);
  border:2px solid var(--gold-lt);border-top:none;overflow:hidden;aspect-ratio:0.72;
}
.armoire-body::before{
  content:'';position:absolute;inset:4px;
  border:0.5px solid rgba(200,160,170,0.2);pointer-events:none;z-index:50;
}
.armoire-behind{
  position:absolute;inset:0;
  background:linear-gradient(155deg,#F5D8E8 0%,#E8C0D0 45%,#D4A0BC 100%);
  display:flex;align-items:center;justify-content:center;z-index:1;
}
.door-left,.door-right{
  position:absolute;top:0;width:50%;height:100%;z-index:10;
  transition:transform 1.2s cubic-bezier(0.77,0,0.18,1);
  overflow:hidden;background:var(--panel-dark);
}
.door-left{left:0;transform-origin:left center;border-right:1px solid rgba(200,160,170,0.2);}
.door-right{right:0;transform-origin:right center;border-left:1px solid rgba(200,160,170,0.2);}
.door-left svg,.door-right svg{width:100%;height:100%;display:block;}
.armoire-wrap.open .door-left{transform:translateX(-100%);}
.armoire-wrap.open .door-right{transform:translateX(100%);}
.armoire-feet{display:flex;justify-content:space-between;padding:0 8%;}
.foot{width:14%;height:14px;background:var(--panel-dark);border:1px solid var(--gold-lt);border-top:none;border-radius:0 0 3px 3px;}
.open-pill{
  margin-top:22px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;animation:pillpulse 2s ease-in-out infinite;
}
.open-pill-text{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(0.85rem,2.5vw,1rem);letter-spacing:0.1em;
  color:var(--gold-lt);
  background:rgba(200,160,170,0.08);
  border:1.5px solid rgba(200,160,170,0.3);
  border-radius:50px;padding:10px 28px;display:block;transition:all 0.2s;
}
.open-pill:hover .open-pill-text{background:rgba(200,160,170,0.15);border-color:rgba(200,160,170,0.6);}
@keyframes pillpulse{0%,100%{opacity:0.5;transform:scale(1);}50%{opacity:1;transform:scale(1.04);}}

/* GAME */
#game{
  position:fixed;inset:0;
  display:grid;
  grid-template-rows:52px 1fr;
  grid-template-columns:280px 1fr 320px;
  opacity:0;pointer-events:none;
  transition:opacity 0.7s ease;
  background:var(--panel-light);
}
#game.visible{opacity:1;pointer-events:all;}

/* MASTHEAD */
.mast{
  grid-column:1/-1;
  background:var(--panel-light);
  border-bottom:1.5px solid var(--panel-dark);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;position:relative;overflow:hidden;
}
.mast::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#F9C5D1 0%,#F9C5D1 25%,#FFD700 25%,#FFD700 50%,#C9A0A8 50%,#C9A0A8 75%,#9B3060 75%);
}
.mast-logo{font-family:'Playfair Display',serif;font-style:italic;font-weight:700;font-size:1.15rem;color:var(--ink);}
.mast-center{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:0.9rem;color:var(--ink);opacity:0.85;
  position:relative;padding:0 24px;
}
.mast-center::before,.mast-center::after{content:'';position:absolute;top:50%;width:36px;height:1px;background:var(--gold);opacity:0.6;}
.mast-center::before{right:100%;margin-right:-20px;}
.mast-center::after{left:100%;margin-left:-20px;}
.mast-right{display:flex;align-items:center;gap:12px;}
.reset-btn{
  font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;
  background:var(--ink);border:1.5px solid var(--ink);
  color:#FFF8F5;padding:9px 22px;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-weight:500;
  transition:all 0.2s;border-radius:2px;
}
.reset-btn:hover{background:var(--rose);border-color:var(--rose);}

/* LEFT PANEL */
.panel-left{
  background:var(--panel-dark);
  border-right:1px solid var(--panel-border);
  display:flex;flex-direction:column;overflow:hidden;
}
.cat-nav{display:flex;flex-direction:column;border-bottom:1px solid var(--panel-border);flex-shrink:0;}
.cat-nav-btn{
  display:flex;align-items:center;gap:12px;padding:15px 18px;
  border:none;background:none;cursor:pointer;text-align:left;
  border-left:3px solid transparent;transition:all 0.15s;
  border-bottom:1px solid var(--panel-border);
}
.cat-nav-btn:hover{background:rgba(200,160,170,0.06);}
.cat-nav-btn.on{background:rgba(200,160,170,0.08);border-left-color:var(--gold-lt);}
.cat-nav-icon{opacity:0.45;color:rgba(200,160,170,0.6);transition:all 0.15s;display:inline-flex;width:20px;height:20px;flex-shrink:0;}
.cat-nav-btn.on .cat-nav-icon{opacity:1;color:var(--gold-lt);}
.cat-nav-label{font-family:'DM Sans',sans-serif;font-weight:500;font-size:0.75rem;letter-spacing:0.06em;color:rgba(200,160,170,0.55);transition:color 0.15s;flex:1;}
.cat-nav-btn.on .cat-nav-label{color:var(--gold-lt);}
.cat-nav-count{font-size:0.65rem;font-weight:500;color:rgba(200,160,170,0.4);letter-spacing:0.06em;}
.cat-nav-btn.on .cat-nav-count{color:var(--gold-lt);}
.item-scroll{flex:1;overflow-y:auto;padding:14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;align-content:start;}
.item-scroll::-webkit-scrollbar{width:2px;}
.item-scroll::-webkit-scrollbar-thumb{background:rgba(200,160,170,0.25);}

/* LEFT CARDS */
.h-card{
  cursor:pointer;display:flex;flex-direction:column;align-items:center;
  gap:6px;padding:10px 6px;
  border:1px solid var(--panel-item-border);background:var(--panel-item-bg);
  transition:all 0.15s;
}
.h-card:hover{border-color:rgba(200,160,170,0.35);}
.h-card.on{border-color:var(--gold-lt);background:var(--panel-item-on);}
.h-card.locked{opacity:0.5;cursor:not-allowed;}
.h-circle{
  width:54px;height:54px;border-radius:50%;
  border:1.5px solid rgba(200,160,170,0.3);
  background:rgba(200,160,170,0.06);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;overflow:hidden;
  color:rgba(200,160,170,0.6);
}
.h-circle svg{width:32px;height:32px;}
.h-circle img{width:100%;height:100%;object-fit:cover;object-position:center top;}
.h-card.on .h-circle{border-color:var(--gold-lt);}
.h-name{font-size:0.52rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--panel-text);text-align:center;font-family:'DM Sans',sans-serif;}
.h-card.on .h-name{color:var(--gold-lt);}

/* STAGE */
.stage{
  background:linear-gradient(155deg,#F9E8EC 0%,#F0D0DC 45%,#E8C0D0 100%);
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.stage::after{content:'';position:absolute;inset:0;z-index:3;pointer-events:none;background:radial-gradient(ellipse at center,transparent 50%,rgba(58,16,40,0.15) 100%);}
.loader{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  background:linear-gradient(155deg,#F9E8EC,#E8C0D0);
  z-index:10;transition:opacity 0.6s;
}
.loader.hidden{opacity:0;pointer-events:none;}
.loader-bar{width:70px;height:1px;background:rgba(200,160,170,0.2);position:relative;overflow:hidden;}
.loader-bar::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:var(--rose);animation:loadslide 1.2s ease-in-out infinite;}
@keyframes loadslide{0%{left:-100%}100%{left:100%}}
.loader-text{font-family:'Playfair Display',serif;font-style:italic;font-size:0.72rem;color:rgba(155,48,96,0.6);letter-spacing:0.08em;}
.stage-canvas{display:block;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:2;}
.stage-label{position:absolute;top:10px;right:10px;background:var(--panel-dark);color:var(--gold-lt);font-size:0.5rem;letter-spacing:0.22em;text-transform:uppercase;padding:4px 10px;font-family:'DM Sans',sans-serif;z-index:5;}
.stage-reset{position:absolute;top:10px;left:10px;z-index:5;background:rgba(255,248,245,0.18);color:#FFF8F5;border:1px solid rgba(200,160,170,0.4);border-radius:50px;font-size:0.58rem;letter-spacing:0.1em;padding:5px 14px;cursor:pointer;font-family:'Playfair Display',serif;font-style:italic;transition:all 0.2s;}
.stage-reset:hover{background:rgba(255,248,245,0.28);}
.stage-look{position:absolute;bottom:0;left:0;right:0;z-index:5;background:linear-gradient(transparent,rgba(58,16,40,0.45));padding:40px 22px 16px;display:flex;align-items:flex-end;justify-content:space-between;}
.look-name{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:rgba(255,248,245,0.92);}
.look-sub{font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(200,160,170,0.65);}

/* RIGHT PANEL */
.panel-right{background:var(--panel-light);border-left:1px solid var(--right-border);display:flex;flex-direction:column;overflow:hidden;}
.panel-section{display:flex;flex-direction:column;flex:1;overflow:hidden;border-bottom:1px solid var(--right-border);min-height:0;}
.panel-section:last-child{border-bottom:none;flex:1.3;}
.section-head{padding:14px 18px 12px;border-bottom:1px solid var(--right-border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.section-title{font-family:'Playfair Display',serif;font-style:italic;font-size:0.95rem;color:var(--right-title);}
.outfit-tabs{display:flex;border-bottom:1px solid var(--right-border);flex-shrink:0;}
.outfit-tab{flex:1;padding:11px 6px;font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--right-tab-off);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.outfit-tab:hover{color:var(--right-tab-on);}
.outfit-tab.on{color:var(--right-tab-on);border-bottom-color:var(--rose);}
.r-scroll{flex:1;overflow-y:auto;padding:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;align-content:start;}
.r-scroll::-webkit-scrollbar{width:2px;}
.r-scroll::-webkit-scrollbar-thumb{background:var(--right-border);}
.r-card{cursor:pointer;border:1px solid var(--right-item-border);background:var(--right-item);transition:all 0.15s;position:relative;overflow:hidden;}
.r-card:hover{border-color:var(--rose);background:#FFF0F5;}
.r-card.on{border-color:var(--rose);border-width:1.5px;background:var(--right-item-on);}
.r-card.locked{opacity:0.55;cursor:not-allowed;}
.r-thumb{aspect-ratio:1/1;background:var(--right-thumb);display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--right-border);overflow:hidden;}
.r-thumb img{width:100%;height:100%;object-fit:contain;object-position:center center;padding:4px;}
.r-thumb svg{width:28px;height:28px;opacity:0.5;color:var(--ink);}
.r-info{padding:8px 10px;}
.r-name{font-family:'Libre Baskerville',serif;font-style:italic;font-size:0.6rem;color:var(--right-title);line-height:1.3;}
.r-card.on .r-name{color:var(--rose);}
.r-tag{font-size:0.52rem;letter-spacing:0.05em;text-transform:uppercase;color:var(--right-tab-off);margin-top:2px;}
.r-tick{position:absolute;top:4px;right:4px;width:13px;height:13px;border-radius:50%;background:var(--rose);color:#fff;display:none;align-items:center;justify-content:center;font-size:0.45rem;font-weight:700;}
.r-card.on .r-tick{display:flex;}

/* SHOE SLOTS */
.shoe-slot{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid transparent;border-bottom:1px solid var(--right-border);cursor:pointer;width:100%;background:none;text-align:left;transition:all 0.15s;font-family:'DM Sans',sans-serif;}
.shoe-slot:hover{background:var(--blush);}
.shoe-slot.on{background:var(--blush);border-left:2px solid var(--rose);}
.shoe-slot.locked{opacity:0.55;cursor:not-allowed;}
.shoe-slot-icon{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0;border:1px solid var(--right-border);display:flex;align-items:center;justify-content:center;background:var(--right-thumb);color:var(--ink);}
.shoe-slot-icon svg{width:20px;height:20px;opacity:0.6;}
.shoe-slot.on .shoe-slot-icon{border-color:var(--rose);}
.shoe-slot-info{flex:1;}
.shoe-slot-name{font-family:'Libre Baskerville',serif;font-style:italic;font-size:0.68rem;color:var(--right-title);}
.shoe-slot.on .shoe-slot-name{color:var(--rose);}
.shoe-slot-tag{font-size:0.5rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--right-tab-off);margin-top:1px;}
.shoe-dot{width:5px;height:5px;border-radius:50%;border:1px solid var(--right-border);flex-shrink:0;}
.shoe-slot.on .shoe-dot{background:var(--rose);border-color:var(--rose);}
.shoe-scroll{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:0;}
.shoe-scroll::-webkit-scrollbar{width:2px;}
.shoe-scroll::-webkit-scrollbar-thumb{background:var(--right-border);}

/* MOBILE */
@media(max-width:768px){
  #game{grid-template-rows:44px 1fr auto auto;grid-template-columns:1fr;}
  .panel-left{display:none;}.panel-right{display:none;}
  .mast{grid-column:1;padding:0 14px;}.mast-center{display:none;}
  .mobile-drawer{display:flex !important;flex-direction:column;background:var(--panel-light);border-top:2px solid var(--panel-dark);height:190px;overflow:hidden;}
  .mobile-drawer::before{content:'';height:3px;flex-shrink:0;background:linear-gradient(90deg,#F9C5D1 0%,#F9C5D1 25%,#FFD700 25%,#FFD700 50%,#C9A0A8 50%,#C9A0A8 75%,#9B3060 75%);}
  .drawer-title{padding:8px 14px 6px;flex-shrink:0;font-family:'Playfair Display',serif;font-style:italic;font-size:0.82rem;color:var(--right-title);border-bottom:1px solid var(--right-border);}
  .drawer-items{flex:1;display:flex;gap:8px;padding:10px 14px;overflow-x:auto;align-items:center;}
  .drawer-items::-webkit-scrollbar{height:2px;}
  .drawer-items::-webkit-scrollbar-thumb{background:var(--rose);}
  .mobile-nav{display:flex !important;background:var(--panel-dark);border-top:2px solid var(--rose);}
  .mobile-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:9px 4px 11px;cursor:pointer;border:none;background:none;position:relative;transition:all 0.15s;}
  .mobile-nav-btn::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--rose);transform:scaleX(0);transition:transform 0.2s;}
  .mobile-nav-btn.on::after{transform:scaleX(1);}
  .mobile-nav-icon{opacity:0.35;color:rgba(200,160,170,0.5);transition:all 0.15s;display:inline-flex;width:20px;height:20px;}
  .mobile-nav-btn.on .mobile-nav-icon{opacity:1;color:var(--gold-lt);}
  .mobile-nav-label{font-size:0.48rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(200,160,170,0.3);font-family:'DM Sans',sans-serif;transition:color 0.15s;}
  .mobile-nav-btn.on .mobile-nav-label{color:var(--gold-lt);}
}
.mobile-drawer{display:none;}.mobile-nav{display:none;}
</style>
</head>

var canvas = document.getElementById('stage');
var ctx = canvas.getContext('2d');
var DW=520, DH=780;
function sizeCanvas(){
  var stage=canvas.parentElement;
  var h=stage.clientHeight||(window.innerHeight-52);
  var w=Math.round(h*(DW/DH));
  canvas.style.height=h+'px';canvas.style.width=w+'px';
}
canvas.width=DW*2;canvas.height=DH*2;ctx.scale(2,2);
window.addEventListener('load',function(){sizeCanvas();render();});
window.addEventListener('resize',sizeCanvas);
if(document.readyState==='complete'){sizeCanvas();}

// ── DRAW ENGINE (same as Adoma) ──
function loadImg(src,cb,errCb){var img=new Image();img.crossOrigin='anonymous';img.onload=function(){cb(img);};img.onerror=function(){if(errCb)errCb();};img.src=src;}

function drawLayer(img,W,H,ox,oy){
  var iw=img.naturalWidth||img.width,ih=img.naturalHeight||img.height;
  if(!iw||!ih)return;
  var scale=W/iw;
  var dw=iw*scale,dh=ih*scale;
  var dx=(W-dw)/2+(ox||0);
  var dy=(oy||0);
  ctx.drawImage(img,0,0,iw,ih,dx,dy,dw,dh);
}

function stripAndDraw(img,W,H,ox,oy){
  var iw=img.naturalWidth,ih=img.naturalHeight;
  if(!iw||!ih)return;
  var k=iw+'x'+ih+img.src.slice(-20);
  if(!stripCache[k]){
    var off=document.createElement('canvas');off.width=iw;off.height=ih;
    var c2=off.getContext('2d');c2.drawImage(img,0,0);
    var d=c2.getImageData(0,0,iw,ih),px=d.data;
    for(var n=0;n<px.length;n+=4){if(px[n]>235&&px[n+1]>235&&px[n+2]>235)px[n+3]=0;}
    c2.putImageData(d,0,0);stripCache[k]=off;
  }
  ctx.drawImage(stripCache[k],0,0,stripCache[k].width,stripCache[k].height,(ox||0),(oy||0),W,H);
}

function checkTransparency(img,key,cat){
  var ck=cat+'_'+key;
  if(transparencyCache[ck]!==undefined)return transparencyCache[ck];
  var iw=img.naturalWidth,ih=img.naturalHeight;
  if(!iw||!ih)return false;
  var off=document.createElement('canvas');off.width=iw;off.height=ih;
  var c2=off.getContext('2d');c2.drawImage(img,0,0);
  var corners=[[0,0],[iw-1,0],[0,ih-1],[iw-1,ih-1]];
  var hasA=corners.some(function(c){return c2.getImageData(c[0],c[1],1,1).data[3]<200;});
  transparencyCache[ck]=hasA;return hasA;
}

function render(){
  var W=DW,H=DH;ctx.clearRect(0,0,W,H);
  // BG gradient
  var g=ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,'#F9E8EC');g.addColorStop(0.5,'#F0D0DC');g.addColorStop(1,'#E8C0D0');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  function draw(img,key,cat){
    if(!img)return;
    if(checkTransparency(img,key,cat))drawLayer(img,W,H);
    else stripAndDraw(img,W,H);
  }

  // Draw order: base -> shoe -> bottom -> top -> accent
  if(baseImg)draw(baseImg,'base','base');

  if(state.shoe&&shoeImgs[state.shoe])draw(shoeImgs[state.shoe],state.shoe,'shoe');

  if(state.set==='kente_set'){
    if(outfitImgs['kente_skirt'])draw(outfitImgs['kente_skirt'],'kente_skirt','outfit');
    if(outfitImgs['kente_top'])draw(outfitImgs['kente_top'],'kente_top','outfit');
  } else {
    if(state.bottom&&outfitImgs[state.bottom])draw(outfitImgs[state.bottom],state.bottom,'outfit');
    if(state.top&&outfitImgs[state.top])draw(outfitImgs[state.top],state.top,'outfit');
  }

  if(state.accent&&accentImgs[state.accent])draw(accentImgs[state.accent],state.accent,'accent');
}

function updateOutfitCard(key,url){
  document.querySelectorAll('.r-card[data-key="'+key+'"]').forEach(function(c){

  // Also unlock kente_set card when both pieces load

    });
  }
}

  btn.innerHTML='<span class="cat-nav-icon">'+IC[cat.icon]+'</span><span class="cat-nav-label">'+cat.label+'</span><span class="cat-nav-count">'+cat.count+'</span>';
  btn.addEventListener('click',function(){
    document.querySelectorAll('.cat-nav-btn').forEach(function(b){b.classList.remove('on');});
    btn.classList.add('on');
    renderLeft(cat.key);
  });
  catNav.appendChild(btn);
});

function renderLeft(cat){
  var container=document.getElementById('left-items');
  container.innerHTML='';
  var items=ACCENT_ITEMS;
  items.forEach(function(item){
    var isSelected=state.accent===item.key||(item.key==='none'&&!state.accent);
    var card=document.createElement('div');
    card.className='h-card'+(item.locked?' locked':'')+(isSelected?' on':'');
    card.setAttribute('data-cat',cat);card.setAttribute('data-key',item.key);
    card.setAttribute('role','button');card.setAttribute('tabindex','0');
    card.innerHTML='<div class="h-circle" id="thumb-'+cat+'-'+item.key+'">'+IC[item.icon]+'</div><div class="h-name">'+item.label+'</div>';
    if(!item.locked){
      (function(k){card.addEventListener('click',function(){
        state.accent=(k==='none')?null:k;
        renderLeft(cat);updateLook();render();
      });})(item.key);
    } else {
      (function(k){card.addEventListener('click',function(){
        if(unlockedAssets['accent_'+k]){
          state.accent=k;
          ACCENT_ITEMS.forEach(function(i){if(i.key===k)i.locked=false;});
          renderLeft(cat);updateLook();render();
        }
      });})(item.key);
    }
    container.appendChild(card);
  });
}
renderLeft('accents');

// ── OUTFIT TABS ──
var outfitTabBar=document.getElementById('outfit-tabs');
var outfitGrid=document.getElementById('outfit-grid');
['sets','tops','bottoms','dresses'].forEach(function(cat,i){
  var tab=document.createElement('button');
  tab.className='outfit-tab'+(i===0?' on':'');
  tab.textContent=cat.charAt(0).toUpperCase()+cat.slice(1);
  tab.addEventListener('click',function(){
    document.querySelectorAll('.outfit-tab').forEach(function(t){t.classList.remove('on');});
    tab.classList.add('on');currentOutfitCat=cat;renderOutfits();
  });
  outfitTabBar.appendChild(tab);
});

function renderOutfits(){
  outfitGrid.innerHTML='';
  var items=OUTFIT_CATS[currentOutfitCat]||[];
  items.forEach(function(item){
    var card=document.createElement('div');
    // Always use outfitImgs as source of truth -- locked if image not loaded
    var isLocked;
    if(item.key==='kente_set') isLocked=!(outfitImgs['kente_top']&&outfitImgs['kente_skirt']);
    else isLocked=!outfitImgs[item.key];
    // Determine which state slot this item uses
    var slot = currentOutfitCat==='sets' ? 'set' : currentOutfitCat==='tops' ? 'top' : currentOutfitCat==='bottoms' ? 'bottom' : 'top';
    var isActive = state[slot]===item.key;
    card.className='r-card'+(isLocked?' locked':'')+(isActive?' on':'');
    card.dataset.key=item.key;
    card.setAttribute('role','button');card.setAttribute('tabindex','0');
    var thumb=document.createElement('div');thumb.className='r-thumb';
    if(!isLocked&&(outfitImgs[item.key]||item.key==='kente_set')){
      var img=new Image();
      img.src=(item.key==='kente_set')?'assets/kente_top.png':item.url;
      img.style.cssText='width:100%;height:100%;object-fit:cover;object-position:center top;';
      thumb.appendChild(img);
    } else {thumb.innerHTML=IC[item.icon];}
    var info=document.createElement('div');info.className='r-info';
    info.innerHTML='<div class="r-name">'+item.label+'</div><div class="r-tag">'+item.tag+'</div>';
    var tick=document.createElement('div');tick.className='r-tick';tick.textContent='✓';
    card.appendChild(thumb);card.appendChild(info);card.appendChild(tick);
    (function(it,sl){card.addEventListener('click',function(){
      if(card.classList.contains('locked'))return;
      // Selecting a set clears individual top/bottom; selecting individual clears set
      if(sl==='set'){state.set=(state.set===it.key)?null:it.key;state.top=null;state.bottom=null;}
      else{state[sl]=(state[sl]===it.key)?null:it.key;state.set=null;}
      renderOutfits();updateLook();render();
    });})(item,slot);
    outfitGrid.appendChild(card);
  });
}
renderOutfits();

// ── SHOE SLOTS ──
var shoeGrid=document.getElementById('shoe-grid');
var shoeNone=document.createElement('button');
shoeNone.className='shoe-slot on';shoeNone.id='shoe-none';
shoeNone.innerHTML='<div class="shoe-slot-icon">'+IC.slip_ic+'</div><div class="shoe-slot-info"><div class="shoe-slot-name">Barefoot</div></div><div class="shoe-dot"></div>';
shoeNone.addEventListener('click',function(){state.shoe=null;renderShoes();updateLook();render();});
shoeGrid.appendChild(shoeNone);

function renderShoes(){
  document.querySelectorAll('.shoe-slot[data-key]').forEach(function(s){s.classList.toggle('on',state.shoe===s.dataset.key);});
  document.getElementById('shoe-none').classList.toggle('on',!state.shoe);
}
SHOE_DATA.forEach(function(item){
  var slot=document.createElement('button');
  slot.className='shoe-slot locked';slot.dataset.key=item.key;
  slot.innerHTML='<div class="shoe-slot-icon">'+IC[item.icon]+'</div><div class="shoe-slot-info"><div class="shoe-slot-name">'+item.label+'</div><div class="shoe-slot-tag">'+item.tag+'</div></div><div class="shoe-dot"></div>';
  (function(it){slot.addEventListener('click',function(){
    if(slot.classList.contains('locked'))return;
    state.shoe=(state.shoe===it.key)?null:it.key;
    renderShoes();updateLook();render();
  });})(item);
  shoeGrid.appendChild(slot);
});

// ── MOBILE NAV ──
var mobileNav=document.getElementById('mobile-nav');
var MOB_CATS=[
  {key:'outfits',label:'Outfits',icon:'outfit'},
  {key:'accents',label:'Accents',icon:'accents'},
  {key:'shoes',  label:'Shoes',  icon:'shoes'},
];
MOB_CATS.forEach(function(cat,i){
  var btn=document.createElement('button');
  btn.className='mobile-nav-btn'+(i===0?' on':'');
  btn.innerHTML='<span class="mobile-nav-icon">'+IC[cat.icon]+'</span><span class="mobile-nav-label">'+cat.label+'</span>';
  btn.addEventListener('click',function(){
    document.querySelectorAll('.mobile-nav-btn').forEach(function(b){b.classList.remove('on');});
    btn.classList.add('on');currentMobileCat=cat.key;renderMobileDrawer(cat.key);
  });
  mobileNav.appendChild(btn);
});

function renderMobileDrawer(cat){
  document.getElementById('drawer-title').textContent=cat.charAt(0).toUpperCase()+cat.slice(1);
  var container=document.getElementById('drawer-items');container.innerHTML='';
  if(cat==='outfits'){
    var all=OUTFIT_CATS.sets.concat(OUTFIT_CATS.tops).concat(OUTFIT_CATS.bottoms).concat(OUTFIT_CATS.dresses);
    all.forEach(function(item){
      var isLocked=item.key==='kente_set'?!(outfitImgs['kente_top']&&outfitImgs['kente_skirt']):(item.locked||!outfitImgs[item.key]);
      var sl=OUTFIT_CATS.sets.find(function(x){return x.key===item.key;})?'set':OUTFIT_CATS.bottoms.find(function(x){return x.key===item.key;})?'bottom':'top';
      var isActive=state[sl]===item.key;
      var card=document.createElement('div');
      card.className='h-card'+(isLocked?' locked':'')+(isActive?' on':'');
      card.style.cssText='flex-shrink:0;min-width:60px;';
      card.innerHTML='<div class="h-circle">'+IC[item.icon]+'</div><div class="h-name">'+item.label+'</div>';
      if(!isLocked){(function(it){
        var sl=OUTFIT_CATS.sets.find(function(x){return x.key===it.key;})?'set':OUTFIT_CATS.bottoms.find(function(x){return x.key===it.key;})?'bottom':'top';
        card.addEventListener('click',function(){
          if(sl==='set'){state.set=(state.set===it.key)?null:it.key;state.top=null;state.bottom=null;}
          else{state[sl]=(state[sl]===it.key)?null:it.key;state.set=null;}
          renderMobileDrawer(cat);updateLook();render();
        });
      })(item);}
      container.appendChild(card);
    });
  } else if(cat==='shoes'){
    SHOE_DATA.forEach(function(item){
      var card=document.createElement('div');
      card.className='h-card'+(shoeImgs[item.key]?'':' locked')+(state.shoe===item.key?' on':'');
      card.style.cssText='flex-shrink:0;min-width:60px;';
      card.innerHTML='<div class="h-circle">'+IC[item.icon]+'</div><div class="h-name">'+item.label+'</div>';
      if(shoeImgs[item.key]){(function(k){card.addEventListener('click',function(){state.shoe=(state.shoe===k)?null:k;renderMobileDrawer(cat);updateLook();render();});})(item.key);}
      container.appendChild(card);
    });
  } else {
    ACCENT_ITEMS.forEach(function(item){
      var card=document.createElement('div');
      card.className='h-card'+(item.locked?' locked':'')+(state.accent===item.key||(item.key==='none'&&!state.accent)?' on':'');
      card.style.cssText='flex-shrink:0;min-width:60px;';
      card.innerHTML='<div class="h-circle">'+IC[item.icon]+'</div><div class="h-name">'+item.label+'</div>';
      if(!item.locked){(function(k){card.addEventListener('click',function(){state.accent=(k==='none')?null:k;renderMobileDrawer(cat);updateLook();render();});})(item.key);}
      container.appendChild(card);
    });
  }
}
renderMobileDrawer('outfits');

// ── LOOK UPDATE ──
function updateLook(){
  var parts=[],subs=[];
  var all=OUTFIT_CATS.sets.concat(OUTFIT_CATS.tops).concat(OUTFIT_CATS.bottoms).concat(OUTFIT_CATS.dresses);
  [state.set,state.top,state.bottom].forEach(function(key){
    if(!key)return;
    var found=all.find(function(i){return i.key===key;});
    if(found){parts.push(found.label);if(found.tag)subs.push(found.tag);}
  });
  document.getElementById('look-name').innerHTML=parts.length?'<em>'+parts.join(' · ')+'</em>':'';
  document.getElementById('look-sub').textContent=subs.join(' · ');
}

// ── RESET ──
function resetAll(){
  if(!confirm('Reset look?'))return;
  state={accent:null,set:null,top:null,bottom:null,shoe:null};
  renderLeft('accents');renderOutfits();renderShoes();
  renderMobileDrawer(currentMobileCat);updateLook();render();
}

// ── ARMOIRE ──
function openArmoire(){
  var wrap=document.getElementById('armoireWrap');
  if(wrap.classList.contains('open'))return;
  wrap.classList.add('open');
  setTimeout(function(){
    document.getElementById('landing').classList.add('gone');
    document.getElementById('game').classList.add('visible');
  },1300);
}
</script>

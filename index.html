<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zuri's Closet</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #F9E8EC 0%, #F5DDE8 30%, #F0D5E2 60%, #EDD5C8 85%, #EED0B8 100%);
    font-family: Georgia, serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 1rem;
  }
  .card {
    background: rgba(255,250,248,0.92);
    border-radius: 28px;
    border: 1.5px solid rgba(220,170,175,0.35);
    padding: 1.5rem 1.75rem;
    max-width: 860px;
    width: 100%;
    box-shadow: 0 8px 48px rgba(160,80,100,0.1);
  }
  .title { text-align: center; margin-bottom: 1.25rem; }
  .title h1 { font-size: 32px; color: #8B3055; letter-spacing: 1px; }
  .title p { font-size: 13px; color: #C09098; font-family: 'Segoe UI', sans-serif; margin-top: 4px; }
  .layout { display: flex; gap: 1.5rem; align-items: flex-start; }
  .doll-col { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .doll-frame {
    width: 280px; height: 480px;
    background: linear-gradient(180deg, #FFF0F5 0%, #FDE8D8 100%);
    border-radius: 24px;
    border: 1.5px solid rgba(210,160,170,0.3);
    overflow: hidden; position: relative; transition: background 0.3s;
  }
  .doll-frame canvas { position: absolute; top:0; left:0; width:100%; height:100%; }
  .doll-name { font-size: 22px; color: #8B3055; font-style: italic; }
  .reset-btn {
    font-size: 11px; font-family: 'Segoe UI', sans-serif; color: #B07888;
    background: none; border: 1px solid rgba(180,120,140,0.3);
    border-radius: 20px; padding: 4px 14px; cursor: pointer; transition: all 0.15s;
  }
  .reset-btn:hover { background: #FFF0F5; border-color: #C9559A; color: #8B3055; }
  .wardrobe-col { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .section-title {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: #B07888;
    font-family: 'Segoe UI', sans-serif;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: rgba(180,120,140,0.2); }
  .sub { font-size: 10px; color: #C09AB0; font-family: 'Segoe UI', sans-serif; font-weight: 600; margin-bottom: 3px; }
  .btn-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .outfit-btn {
    width: 70px; height: 70px; border-radius: 14px;
    border: 1.5px solid rgba(210,160,175,0.35);
    background: rgba(255,248,251,0.9);
    cursor: pointer; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3px;
    transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
    overflow: hidden; padding: 4px;
  }
  .outfit-btn.empty { border-style: dashed; border-color: rgba(210,160,175,0.25); cursor: default; opacity: 0.5; }
  .outfit-btn:not(.empty):hover { transform: scale(1.08); border-color: #D4709A; box-shadow: 0 4px 14px rgba(180,60,100,0.15); }
  .outfit-btn.active { border: 2px solid #C9559A; background: #FFE8F4; box-shadow: 0 0 0 3px rgba(201,85,154,0.12); transform: scale(1.05); }
  .outfit-btn img { width: 52px; height: 52px; object-fit: contain; }
  .outfit-btn .ico { font-size: 24px; line-height: 1; }
  .outfit-btn .lbl { font-size: 8px; font-weight: 700; color: #A04070; text-align: center; font-family: 'Segoe UI', sans-serif; line-height: 1.1; }
  .outfit-btn.empty .lbl { color: #D0A8B8; font-weight: 400; font-style: italic; }
  .acc-btn {
    height: 36px; padding: 0 12px; border-radius: 20px;
    border: 1.5px solid rgba(210,160,175,0.35);
    background: rgba(255,248,251,0.9);
    cursor: pointer; display: flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600; color: #A04070;
    font-family: 'Segoe UI', sans-serif; transition: all 0.12s;
  }
  .acc-btn:hover { border-color: #D4709A; background: #FFF0F7; }
  .acc-btn.active { border: 2px solid #C9559A; background: #FFE8F4; box-shadow: 0 0 0 3px rgba(201,85,154,0.1); }
  .bg-swatches { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
  .swatch { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.7); box-shadow: 0 1px 5px rgba(0,0,0,0.1); transition: transform 0.12s; }
  .swatch:hover { transform: scale(1.22); }
  .swatch.active { border-color: #8B3055; box-shadow: 0 0 0 2.5px rgba(139,48,85,0.3); transform: scale(1.12); }
</style>
</head>
<body>
<div class="card">
  <div class="title">
    <h1>✦ Zuri's Closet ✦</h1>
    <p>Mix, match, and style her up!</p>
  </div>
  <div class="layout">
    <div class="doll-col">
      <div class="doll-frame" id="dollFrame">
        <canvas id="dollCanvas" width="280" height="480"></canvas>
      </div>
      <div class="doll-name">Zuri 🌸</div>
      <button class="reset-btn" onclick="resetAll()">✦ Start over</button>
    </div>
    <div class="wardrobe-col">
      <div class="section-title">✨ Full Sets</div>
      <div class="btn-row">
        <button class="outfit-btn" id="btn-kente-set" onclick="selectSet('kente_set', this)">
          <span class="ico">🇬🇭</span>
          <span class="lbl">Blue Kente Set</span>
        </button>
        <button class="outfit-btn empty"><span class="ico">✦</span><span class="lbl">coming soon</span></button>
        <button class="outfit-btn empty"><span class="ico">✦</span><span class="lbl">coming soon</span></button>
      </div>

      <div class="section-title">👚 Tops</div>
      <div class="btn-row">
        <button class="outfit-btn" onclick="selectLayer('top','kente_top',this)">
          <span class="ico">👘</span><span class="lbl">Kente Top</span>
        </button>
        <button class="outfit-btn empty"><span class="ico">✦</span><span class="lbl">blazer</span></button>
        <button class="outfit-btn empty"><span class="ico">✦</span><span class="lbl">jumpsuit</span></button>
        <button class="outfit-btn empty"><span class="ico">✦</span><span class="lbl">dress top</span></button>
      </div>

      <div class="section-title">👗 Bottoms</div>
      <div class="btn-row">
        <button class="outfit-btn" onclick="selectLayer('bottom','kente_skirt',this)">
          <span class="ico">👗</span><span class="lbl">Kente Skirt</span>
        </button>
        <button class="outfit-btn empty"><span class="ico">✦</span><span class="lbl">jeans</span></button>
        <button class="outfit-btn empty"><span class="ico">✦</span><span class="lbl">wide pants</span></button>
        <button class="outfit-btn empty"><span class="ico">✦</span><span class="lbl">maxi skirt</span></button>
      </div>

      <div class="section-title">💎 Accessories</div>
      <div class="btn-row">
        <button class="acc-btn" onclick="toggleAcc('flower_crown',this)"><span>🌸</span> Flower Crown</button>
        <button class="acc-btn" onclick="toggleAcc('headband',this)"><span>🎀</span> Headband</button>
        <button class="acc-btn" onclick="toggleAcc('earrings',this)"><span>💎</span> Earrings</button>
        <button class="acc-btn" onclick="toggleAcc('shoes',this)"><span>👠</span> Shoes</button>
      </div>

      <div class="section-title">🎨 Background</div>
      <div class="bg-swatches" id="swatches"></div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('dollCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const PATHS = {
  base:         'zuri_base.png',
  kente_top:    'assets/kente_top.png',
  kente_skirt:  'assets/kente_skirt.png',
  flower_crown: 'assets/flower_crown.png',
  headband:     'assets/headband.png',
  earrings:     'assets/earrings.png',
  shoes:        'assets/shoes.png',
};

const SETS = {
  kente_set: ['kente_skirt', 'kente_top'],
};

const state = { top: null, bottom: null, set: null, accessories: new Set() };

// Preload all images
const imgs = {};
function getImg(key) {
  if (!imgs[key]) {
    const img = new Image();
    img.src = PATHS[key];
    img.onload = draw;
    imgs[key] = img;
  }
  return imgs[key];
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  const base = getImg('base');
  if (base.complete && base.naturalWidth > 0) ctx.drawImage(base, 0, 0, W, H);

  if (state.set) {
    SETS[state.set].forEach(key => {
      const img = getImg(key);
      if (img.complete && img.naturalWidth > 0) ctx.drawImage(img, 0, 0, W, H);
    });
  } else {
    if (state.bottom) { const img = getImg(state.bottom); if (img.complete && img.naturalWidth > 0) ctx.drawImage(img, 0, 0, W, H); }
    if (state.top)    { const img = getImg(state.top);    if (img.complete && img.naturalWidth > 0) ctx.drawImage(img, 0, 0, W, H); }
  }

  state.accessories.forEach(key => {
    if (PATHS[key]) { const img = getImg(key); if (img.complete && img.naturalWidth > 0) ctx.drawImage(img, 0, 0, W, H); }
  });
}

function selectSet(id, btn) {
  state.set = state.set === id ? null : id;
  state.top = null; state.bottom = null;
  document.querySelectorAll('.outfit-btn').forEach(b => b.classList.remove('active'));
  if (state.set) { btn.classList.add('active'); SETS[id].forEach(k => getImg(k)); }
  draw();
}

function selectLayer(type, id, btn) {
  state.set = null;
  document.querySelectorAll('.outfit-btn').forEach(b => b.classList.remove('active'));
  state[type] = state[type] === id ? null : id;
  if (state[type]) btn.classList.add('active');
  draw();
}

function toggleAcc(id, btn) {
  if (state.accessories.has(id)) { state.accessories.delete(id); btn.classList.remove('active'); }
  else { state.accessories.add(id); btn.classList.add('active'); getImg(id); }
  draw();
}

function resetAll() {
  state.top = null; state.bottom = null; state.set = null; state.accessories.clear();
  document.querySelectorAll('.outfit-btn, .acc-btn').forEach(b => b.classList.remove('active'));
  draw();
}

// Preload base immediately
getImg('base');

// Background swatches
const SWATCHES = [
  { label:'Blush Champagne', bg:'linear-gradient(180deg,#FFF0F5 0%,#FDE8D8 100%)', d:'#F5D8E0' },
  { label:'Lavender',        bg:'linear-gradient(180deg,#F5F0FF 0%,#E4D8F8 100%)', d:'#E8DAFF' },
  { label:'Mint',            bg:'linear-gradient(180deg,#F0FFF8 0%,#D8F0E8 100%)', d:'#D0F0E4' },
  { label:'Sky',             bg:'linear-gradient(180deg,#EDF6FF 0%,#D5E8F8 100%)', d:'#C8E4FF' },
  { label:'Peach',           bg:'linear-gradient(180deg,#FFF4EE 0%,#F8E0D0 100%)', d:'#F8D8C0' },
  { label:'White',           bg:'#FFFFFF', d:'#FFFFFF' },
];
const dollFrame = document.getElementById('dollFrame');
document.getElementById('swatches').innerHTML = SWATCHES.map((s,i) =>
  `<div class="swatch${i===0?' active':''}" title="${s.label}" style="background:${s.d}" onclick="document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));this.classList.add('active');dollFrame.style.background='${s.bg}'"></div>`
).join('');
</script>
</body>
</html>
